version: '3.8'

networks:
  app-network:
    driver: bridge

services:
  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper_1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - app-network

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka_1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - app-network

  # Redis
  redis:
    image: redis:7
    container_name: redis_1
    ports:
      - "6379:6379"
    networks:
      - app-network

  # MongoDB
  mongo:
    image: mongo:7
    container_name: mongo_1
    ports:
      - "27017:27017"
    environment:
      - MONGO_URI=mongodb://mongo:27017/
    networks:
      - app-network

  # Mock Services - AWS
  aws-simulator:
    build:
      context: .
      dockerfile: mocks/Dockerfile
    container_name: aws-simulator
    command: python -m mocks.aws_simulator
    ports:
      - "8001:8001"
    environment:
      SERVICE_PORT: "8001"
    networks:
      - app-network

  # Mock Services - AKS
  aks-simulator:
    build:
      context: .
      dockerfile: mocks/Dockerfile
    container_name: aks-simulator
    command: python -m mocks.aks_simulator
    ports:
      - "8002:8002"
    environment:
      SERVICE_PORT: "8002"
    networks:
      - app-network

  # Mock Services - DigitalOcean
  digitalocean-simulator:
    build:
      context: .
      dockerfile: mocks/Dockerfile
    container_name: digitalocean-simulator
    command: python -m mocks.dodroplets_simulator
    ports:
      - "8003:8003"
    environment:
      SERVICE_PORT: "8003"
    networks:
      - app-network

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - app-network
    depends_on:
      - aws-simulator
      - aks-simulator
      - digitalocean-simulator

  # Prometheus Metrics Adapter - Bridges Prometheus to Kafka
  prometheus-adapter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prometheus-adapter
    environment:
      # Polling configuration (5-second interval)
      PROMETHEUS_POLL_INTERVAL: "5"
      PROMETHEUS_TIMEOUT: "3"
      PROMETHEUS_MAX_RETRIES: "2"
      
      # Prometheus endpoints (use container DNS names from your mock services)
      PROMETHEUS_AWS_URL: "http://aws-simulator:8001/metrics"
      PROMETHEUS_AKS_URL: "http://aks-simulator:8002/metrics"
      PROMETHEUS_DO_URL: "http://digitalocean-simulator:8003/metrics"
      
      # Kafka configuration (internal Docker network)
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      
      # Logging
      LOG_LEVEL: "INFO"
      
      # Python
      PYTHONUNBUFFERED: "1"
    
    depends_on:
      - kafka
      - aws-simulator
      - aks-simulator
      - digitalocean-simulator
      - prometheus
    
    networks:
      - app-network
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "python", "-c", "import os; print('Health check OK')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  service-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: service-agent
    command: python runners/service_agent_runner.py
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      SERVICE_ID: "service-cache-aws"
      LOG_LEVEL: "INFO"
      PYTHONUNBUFFERED: "1"
    depends_on:
      - kafka
    networks:
      - app-network
    restart: unless-stopped

  service-agent-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: service-agent-2
    command: python runners/service_agent_runner.py
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      SERVICE_ID: "service-db"
      LOG_LEVEL: "INFO"
      PYTHONUNBUFFERED: "1"
    depends_on:
      - kafka
    networks:
      - app-network
    restart: unless-stopped

  service-agent-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: service-agent-3
    command: python runners/service_agent_runner.py
    environment:
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      SERVICE_ID: "service-cache"
      LOG_LEVEL: "INFO"
      PYTHONUNBUFFERED: "1"
    depends_on:
      - kafka
    networks:
      - app-network
    restart: unless-stopped